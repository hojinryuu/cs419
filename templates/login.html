<!DOCTYPE html>
<html>
<head>
    <title>Secure-App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container">
        <h2>Log In</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-container">
                {% for category, message in messages %}
                <div class="alert {{ category }}" style="color: red; font-weight: bold; margin-bottom: 15px;">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
        {% endwith %}
        <form action="">
            <label for="username">
                Username
            </label>
            <input type="text" id="username" name="username" 
                placeholder="Enter Username" required>

            <label for="password">
                Password
            </label>
            <input type="password" id="password" name="password" 
                placeholder="Enter Password" required>

            <div class="wrap">
                <button type="submit">
                    Log In
                </button>
            </div>
        </form>
    </div>
    <p>Not registered?
        <a href="{{ url_for('signup') }}" style="text-decoration: none;">Create an account</a>
    </p>
</body>
</html>
